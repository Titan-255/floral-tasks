<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Tasks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">🌸 Floral Tasks</div>
        <ul class="nav-links">
            <li><a href="#" class="active" data-filter="all">All Tasks</a></li>
            <li><a href="#" data-filter="completed">Completed</a></li>
            <li><a href="#" data-filter="pending">Pending</a></li>
            <li><a href="#" id="logoutBtn" style="color:var(--primary); font-weight:700;">Log Out</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Organize Your Tasks Efficiently</h1>
        <p>A simple and powerful task manager</p>
        <button id="scrollToAddBtn" class="primary-btn">Add Task</button>
    </header>

    <main class="container">
        <section id="addTaskSection" class="task-input-section">
            <div class="card add-task-card">
                <h2>Create a new task</h2>
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="input-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" required placeholder="What needs to be done?">
                    </div>
                    <div class="input-group">
                        <label for="taskDescription">Task Description</label>
                        <textarea id="taskDescription" rows="3" required placeholder="Add some details..."></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="primary-btn full-width">Add Task</button>
                    <button type="button" id="cancelBtn" class="secondary-btn full-width hidden">Cancel Edit</button>
                </form>
            </div>
        </section>

        <section class="task-display-section">
            <h2 id="gridTitle">Your Tasks</h2>
            <div class="task-grid" id="taskGrid">
                <!-- Task cards will be added here dynamically -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
